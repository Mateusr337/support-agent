services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-support_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-support_agent}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "${QDRANT_HTTP_PORT:-6335}:6333"
      - "${QDRANT_GRPC_PORT:-6336}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-support_agent}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
